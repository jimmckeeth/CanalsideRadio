name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to publish
        required: true
        default: both
        type: choice
        options: [android, ios, both]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-android:
    name: Publish Android
    if: |
      github.event_name == 'release' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - run: flutter pub get

      - name: Configure signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/keystore.jks
          echo "CM_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Shorebird release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.CM_KEYSTORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.CM_KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.CM_KEY_PASSWORD }}
        run: shorebird release android --build-number $(git rev-list --count HEAD)

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  publish-ios:
    name: Publish iOS
    if: |
      github.event_name == 'release' ||
      inputs.platform == 'ios' ||
      inputs.platform == 'both'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - run: flutter pub get

      - name: Install Apple certificate and provisioning profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_CERTIFICATE_BASE64" | base64 -d > $RUNNER_TEMP/certificate.p12
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > $RUNNER_TEMP/profile.mobileprovision

          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Shorebird release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release ios --export-options-plist ios/ExportOptions.plist --build-number $(git rev-list --count HEAD)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/ipa/
          if-no-files-found: error

  github-release:
    name: Attach artifacts to GitHub Release
    needs: [publish-android, publish-ios]
    if: |
      always() &&
      (needs.publish-android.result == 'success' || needs.publish-android.result == 'skipped') &&
      (needs.publish-ios.result == 'success' || needs.publish-ios.result == 'skipped') &&
      (needs.publish-android.result == 'success' || needs.publish-ios.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifact
        if: needs.publish-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts/android

      - name: Download iOS artifact
        if: needs.publish-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-ios
          path: artifacts/ios

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android/*.aab
            artifacts/ios/*.ipa

  upload-play-store:
    name: Upload to Play Store
    needs: github-release
    if: |
      always() &&
      needs.github-release.result == 'success' &&
      (github.event_name == 'release' || inputs.platform == 'android' || inputs.platform == 'both')
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts/android

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.thecanalsideradio.radiostream
          releaseFiles: artifacts/android/app-release.aab
          track: internal

  upload-app-store:
    name: Upload to App Store Connect
    needs: github-release
    if: |
      always() &&
      needs.github-release.result == 'success' &&
      (github.event_name == 'release' || inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-latest

    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-ios
          path: artifacts/ios

      - name: Upload to App Store Connect
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$(find artifacts/ios -name "*.ipa" | head -1)" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"
